<script>
   function pesquisar() {
    let pesquisa = document.getElementById("campoPesquisa").value.toLowerCase().trim();

    if (pesquisa.includes("apex")) {
        window.location.href = "destaques.html#apex";
    }
    else if (pesquisa.includes("cyber") || pesquisa.includes("cyberpunk")) {
        window.location.href = "destaques.html#cyberpunk";
    }
    else if (pesquisa.includes("mk")) {
        window.location.href = "destaques.html#mk1";
    }
    else if (pesquisa.includes("fortnite")) {
        window.location.href = "destaques.html#fortnite";
    }
    else if (pesquisa.includes("gta")) {
        window.location.href = "destaques.html#gta5";
    }
    else if (pesquisa.includes("minecraft")) {
        window.location.href = "destaques.html#minecraft";
    }
    else if (pesquisa.includes("valorant")) {
        window.location.href = "destaques.html#valorant";
    }
    else {
        alert("Jogo não encontrado!");
    }
}


</script>
